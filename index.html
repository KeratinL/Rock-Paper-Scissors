<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Create randomNumber function
        function randomNumber() {
            return Math.floor(Math.random() * 3) + 1;
        }
        //Create getComputerChoice function declaration
        function getComputerChoice() {
        //Create rock variable
            let rock = 1;
            //Create paper variable
            let paper = 2;
            //Create scissor variable
            let scissor = 3;
            //Create result variable
            let result = '';
            //Create Random Number Variable
            let computerChoice = randomNumber();
            //Create switch
            switch(true)
            {
                case (computerChoice === rock) : 
                    result = 'rock';
                    break;
                case (computerChoice === paper) : 
                    result = 'paper';
                    break;
                case (computerChoice === scissor) : 
                    result = 'scissor';
                    break;
                default : 
                    console.log('Uhhh... what?');
            }
 
            return result;
        }
        console.log(getComputerChoice());
        
    </script>
    
</body>
</html>
