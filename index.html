<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button class="rock">rock</button>
    <button class="paper">paper</button>
    <button class="scissor">scissor</button>
    <div class="score"></div>
    <div class="result"></div>
    <div class="winner"></div>
    <div class="playAgain"></div>
    
    
    <script>


        //Create randomNumber function
        function randomNumber() {
            return Math.floor(Math.random() * 3) + 1;
        }
        //Create getComputerChoice function declaration
        function getComputerChoice() {
        //Create rock variable
            let rock = 1;
            //Create paper variable
            let paper = 2;
            //Create scissor variable
            let scissor = 3;
            //Create result variable
            let result = '';
            //Create Random Number Variable
            let computerChoice = randomNumber();
            //Create switch
            switch(true)
            {
                case (computerChoice === rock) : 
                    result = 'rock';
                    break;
                case (computerChoice === paper) : 
                    result = 'paper';
                    break;
                case (computerChoice === scissor) : 
                    result = 'scissor';
                    break;
                default : 
                    console.log('Uhhh... what?');
            }
 
            return result;
        }
        /* Previous logic to get player choice
        function getPlayerChoice() {
            let playerChoice = prompt('Choose rock, paper, or scissor', '');
            return playerChoice;
        }
        */
        let round = '';
        let compWins = 0;
        let playerWins = 0;
        
        const divScore = document.querySelector('div.score');
        divScore.textContent = `Let's Play! Please Select a Choice`;
        
        const divResult = document.querySelector('div.result');

        const winner = document.querySelector('div.winner');

        const playAgain = document.querySelector('div.playAgain');
        
        const rock = document.querySelector('button.rock');
        const paper = document.querySelector('button.paper');
        const scissor = document.querySelector('button.scissor');

        rock.addEventListener('click', () => {
            round = playRound(getComputerChoice(), 'rock');
        });
        
        paper.addEventListener('click', () => {
            round = playRound(getComputerChoice(), 'paper');
        });
        
        scissor.addEventListener('click', () => {
            round = playRound(getComputerChoice(), 'scissor');
        });
      
        /*function checkValidAnswer(playerSelection){
            (!(playerSelection == undefined)) ? playerSelection = playerSelection.toLowerCase() : playerSelection = '';
            return playerSelection;
        }
        */
     
        //console.log(getComputerChoice()); Debug getComputerChoice()

        //Create function declaration playRound with two parameters
        function playRound(compSelection, playerSelection){
            
            switch(true){

            //create comparision using logic operator && to see if a value 'beats' another value.
            case (compSelection === 'rock' && playerSelection === 'scissor'):
                divResult.textContent = 'You Lose! Rock beats Scissor';
                round = 'compWins';
                break;

            case (compSelection === 'paper' && playerSelection === 'rock'):
                divResult.textContent = 'You Lose! Paper beats Rock';
                round = 'compWins';
                break;

            case (compSelection === 'scissor' && playerSelection === 'paper'):
                divResult.textContent = 'You Lose! Scissor beats Paper';
                round = 'compWins';
                break;

            case (compSelection === 'rock' && playerSelection === 'paper'):
                divResult.textContent = 'You Win! Paper beats Rock';
                round = 'playerWins';
                break;

            case (compSelection === 'paper' && playerSelection === 'scissor'):
                divResult.textContent = 'You Win! Scissor beats Paper';
                round = 'playerWins';
                break;

            case (compSelection === 'scissor' && playerSelection === 'rock'):
                divResult.textContent = 'You Win! Rock beats Scissor';
                round = 'playerWins';
                break;

            case (compSelection === 'rock' && playerSelection === 'rock'):
                divResult.textContent = 'Draw!';
                break;

            case (compSelection === 'scissor' && playerSelection === 'scissor'):
                divResult.textContent = 'Draw!';
                break;

            case (compSelection === 'paper' && playerSelection === 'paper'):
                divResult.textContent = 'Draw!'
                break;
            }

            if (playerWins === 3 || compWins === 3)
            {
                divResult.textContent = '';
                

                return;
            }

            if ( round == 'compWins') {
                
                compWins += 1;
                divScore.textContent = `Computer Score: ${compWins} Player Score: ${playerWins}`;    
                if (compWins === 3) {  
                    winner.textContent = 'The Computer Wins!';
                    divResult.textContent = '';
                    playAgain.textContent = 'Play Again!';
                    return;
                }

            }       

            else if (round == 'playerWins') {
                    playerWins += 1;
                    divScore.textContent = `Computer Score: ${compWins} Player Score: ${playerWins}`;    
                if (playerWins === 3 ) {
                    winner.textContent = 'You win!';
                    divResult.textContent = '';
                    playAgain.textContent = 'Play Again!';
                    return;
                }
            }
            
            

            
        }
        
    </script>
    
</body>
</html>
